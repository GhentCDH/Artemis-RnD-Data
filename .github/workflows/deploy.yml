name: Deploy to Live

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Deploy build and static to live branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Get current commit info from main
          COMMIT_SHA=$(git rev-parse --short HEAD)

          # Switch to live branch, create if doesn't exist
          if git rev-parse --verify origin/live > /dev/null 2>&1; then
            git checkout -b live origin/live
          else
            git checkout -b live
          fi

          # Remove all tracked files
          git rm -r . 2>/dev/null || true

          # Copy build and static from main
          git checkout main -- build static

          # Add files
          git add build static

          # Commit if there are changes
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "deploy: update data from main ($COMMIT_SHA)"
            git push origin live
          else
            echo "No changes to deploy"
          fi
