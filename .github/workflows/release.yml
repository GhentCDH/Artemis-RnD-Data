name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current version
        id: version
        run: |
          VERSION=$(jq -r '.version' package.json 2>/dev/null)
          if [[ -z "$VERSION" || "$VERSION" == "null" ]]; then VERSION="0.0.0"; fi
          echo "current=$VERSION" >> $GITHUB_OUTPUT
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}
          NEW_PATCH=$((PATCH + 1))
          NEXT_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          echo "next=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "Tag will be: v$NEXT_VERSION"

      - name: Bump version
        run: |
          jq '.version = "${{ steps.version.outputs.next }}"' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Generate changelog
        id: changelog
        run: |
          # Get all commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline --pretty=format:"%h %s")
          else
            COMMITS=$(git log $LAST_TAG..HEAD --oneline --pretty=format:"%h %s")
          fi

          # Parse conventional commits into changelog
          CHANGELOG=$(echo "$COMMITS" | awk '
            BEGIN { feat=""; fix=""; breaking="" }
            /^[a-f0-9]+ feat(\(.+\))?:/ { feat = feat "\n- " substr($0, index($0, $2)) }
            /^[a-f0-9]+ fix(\(.+\))?:/ { fix = fix "\n- " substr($0, index($0, $2)) }
            /BREAKING CHANGE/ { breaking = breaking "\n- " substr($0, index($0, $2)) }
            END {
              if (breaking != "") print "### ­¤Ü© Breaking Changes" breaking
              if (feat != "") print "### Ō£© Features" feat
              if (fix != "") print "### ­¤Éø Bug Fixes" fix
            }
          ')

          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.next }}"
          git push origin main

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.next }}
          release_name: v${{ steps.version.outputs.next }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
